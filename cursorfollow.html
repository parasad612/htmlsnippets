<!doctype html>
<meta charset="utf-8">
<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1020;
        color: white;
        font: 16px system-ui;
    }

    .card {
        width: 320px;
        padding: 2rem;
        border-radius: 24px;
        color: #fff;
        position: relative;
        overflow: hidden;
        background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #7dd3fc55, transparent 35%), #111827;
    }

    h2 {
        margin: 0 0 .5rem;
        font-size: 2rem;
    }
</style>

<div class="card" id="c">
    <h2>Spotlight UI</h2>
    <p>Move your cursor. The light tracks you.</p>
</div>

<script>
    c.onmousemove = e => {
        let r = c.getBoundingClientRect();
        c.style.setProperty('--x', e.clientX - r.left + 'px');
        c.style.setProperty('--y', e.clientY - r.top + 'px')
    }
</script>
